<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#111827" />
  <meta name="application-name" content="SurveyCAD" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="SurveyCAD" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>SurveyCAD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="cadTopbar">
    <div class="brand">SurveyCAD <span>v62.1 PWA</span></div>
    <div class="cadToolbar" role="toolbar" aria-label="CAD toolbar">
      <div class="toolbarGroup fileGroup" aria-label="ファイル操作">
        <button id="openFileBtn" type="button" class="toolBtn primary" title="開く" aria-label="開く"><span class="toolIcon"><svg viewBox="0 0 24 24"><path d="M4 20h16V8l-6-6H4v18z M13 2v7h7 M7 13h10 M7 16h10"/></svg></span><span class="toolLabel">開く</span></button>
        <button id="saveBtn" class="toolBtn" title="保存" aria-label="保存"><span class="toolIcon"><svg viewBox="0 0 24 24"><path d="M5 3h12l2 2v16H5z M8 3v6h8V3 M8 21v-7h8v7"/></svg></span><span class="toolLabel">保存</span></button>
        <button id="saveAsBtn" class="toolBtn" title="名前保存" aria-label="名前保存"><span class="toolIcon"><svg viewBox="0 0 24 24"><path d="M5 3h10l4 4v14H5z M9 17h6 M12 14v6 M15 3v5h4"/></svg></span><span class="toolLabel">名前保存</span></button>
      </div>

      <div class="toolbarGroup currentLayerGroup" aria-label="現在の編集レイヤー">
        <label class="currentLayerControl" title="追加作図に使うレイヤー">
          <span class="currentLayerLabel">現在レイヤ</span>
          <select id="currentLayerSelect" aria-label="現在の編集レイヤー"></select>
        </label>
      </div>
      <div class="toolbarGroup viewGroup" aria-label="閲覧・測定">
        <button id="modePan" class="toolBtn active" title="移動" aria-label="移動"><span class="toolIcon"><svg viewBox="0 0 24 24"><path d="M12 2v20 M2 12h20 M5 9l-3 3 3 3 M19 9l3 3-3 3 M9 5l3-3 3 3 M9 19l3 3 3-3"/></svg></span><span class="toolLabel">移動</span></button>
        <button id="modeCoord" class="toolBtn" title="座標" aria-label="座標"><span class="toolIcon"><svg viewBox="0 0 24 24"><path d="M12 2v20 M2 12h20 M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0-6 0"/></svg></span><span class="toolLabel">座標</span></button>
        <button id="modeDist" class="toolBtn" title="距離" aria-label="距離"><span class="toolIcon"><svg viewBox="0 0 24 24"><path d="M4 18L18 4 M6 20l-2-2 2-2 M16 6l2-2 2 2 M7 15l2 2 M10 12l2 2 M13 9l2 2"/></svg></span><span class="toolLabel">距離</span></button>
        <button id="modeSelect" class="toolBtn" title="選択" aria-label="選択"><span class="toolIcon"><svg viewBox="0 0 24 24"><path d="M5 3l13 9-6 1 3 6-3 1-3-6-4 4z"/></svg></span><span class="toolLabel">選択</span></button>
        <button id="gridToggle" class="toolBtn" title="グリッドON/OFF" aria-label="グリッド"><span class="toolIcon"><svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="1.1"/><circle cx="12" cy="6" r="1.1"/><circle cx="18" cy="6" r="1.1"/><circle cx="6" cy="12" r="1.1"/><circle cx="12" cy="12" r="1.1"/><circle cx="18" cy="12" r="1.1"/><circle cx="6" cy="18" r="1.1"/><circle cx="12" cy="18" r="1.1"/><circle cx="18" cy="18" r="1.1"/></svg></span><span class="toolLabel">GRID</span></button>
        <button id="fitBtn" class="toolBtn" title="全体" aria-label="全体"><span class="toolIcon"><svg viewBox="0 0 24 24"><path d="M4 9V4h5 M20 9V4h-5 M4 15v5h5 M20 15v5h-5"/></svg></span><span class="toolLabel">全体</span></button>
      </div>
      <div class="toolbarGroup drawGroup" aria-label="作図">
        <button id="modeLine" class="toolBtn" title="線分" aria-label="線分"><span class="toolIcon"><svg viewBox="0 0 24 24"><path d="M6 18L18 6"/><circle cx="6" cy="18" r="1.9"/><circle cx="18" cy="6" r="1.9"/></svg></span><span class="toolLabel">線分</span></button>
        <button id="modePoly" class="toolBtn" title="ポリ" aria-label="ポリ"><span class="toolIcon"><svg viewBox="0 0 24 24"><path d="M4 18L9 6l6 12 5-10 M4 18h4 M8 6h2 M14 18h2 M19 8h2"/></svg></span><span class="toolLabel">ポリ</span></button>
        <button id="modeCircle" class="toolBtn" title="円" aria-label="円"><span class="toolIcon"><svg viewBox="0 0 24 24"><path d="M12 4a8 8 0 1 0 0.1 0 M12 12m-2 0a2 2 0 1 0 4 0a2 2 0 1 0-4 0"/></svg></span><span class="toolLabel">円</span></button>
        <button id="modeText" class="toolBtn" title="文字" aria-label="文字"><span class="toolIcon"><svg viewBox="0 0 24 24"><path d="M4 5h16 M12 5v14 M8 19h8"/></svg></span><span class="toolLabel">文字</span></button>
        <button id="modeOffset" class="toolBtn" title="オフセット" aria-label="オフセット"><span class="toolIcon"><svg viewBox="0 0 24 24"><path d="M5 16L15 6"/><path d="M9 20L19 10" stroke-dasharray="2 2"/><path d="M16 6h3v3 M6 16H3v-3"/></svg></span><span class="toolLabel">OFFSET</span></button>
      </div>
      <div class="toolbarGroup editGroup" aria-label="編集・作図操作">
        <button id="undoBtn" class="toolBtn" title="元に戻す" aria-label="元に戻す"><span class="toolIcon"><svg viewBox="0 0 24 24"><path d="M9 7H4v5 M4 12c2-4 6-6 10-5 3 .7 5 3 6 6"/></svg></span><span class="toolLabel">Undo</span></button>
        <button id="redoBtn" class="toolBtn" title="やり直し" aria-label="やり直し"><span class="toolIcon"><svg viewBox="0 0 24 24"><path d="M15 7h5v5 M20 12c-2-4-6-6-10-5-3 .7-5 3-6 6"/></svg></span><span class="toolLabel">Redo</span></button>
        <button id="finishDrawBtn" class="toolBtn" title="確定" aria-label="確定"><span class="toolIcon"><svg viewBox="0 0 24 24"><path d="M4 12l5 5L20 6"/></svg></span><span class="toolLabel">確定</span></button>
        <button id="cancelDrawBtn" class="toolBtn" title="取消" aria-label="取消"><span class="toolIcon"><svg viewBox="0 0 24 24"><path d="M6 6l12 12 M18 6L6 18"/></svg></span><span class="toolLabel">取消</span></button>
      </div>
    </div>
    <div class="fileChip" id="fileName">未選択</div>
    <div class="pwaChip" id="pwaStatus">PWA準備中</div>
    <input id="fileInput" type="file" accept=".dxf,.DXF,application/dxf,application/octet-stream,text/plain" />
  </header>

  <main class="cadMain">
    <div id="canvasWrap">
      <canvas id="canvas"></canvas>
      <div id="notesLayer"></div>
      <div id="ucsWidget" aria-label="Survey UCS">
        <div class="ucsOrigin"></div>
        <div class="ucsAxis ucsAxisX"><span>X</span></div>
        <div class="ucsAxis ucsAxisY"><span>Y</span></div>
        <div class="ucsLabel"></div>
      </div>

      <details class="floatingPanel dropdownPanel snapPanel" aria-label="snap settings">
        <summary>SNAP</summary>
        <div class="dropdownBody">
          <label><input id="snapEnd" type="checkbox" checked> 端点</label>
          <label><input id="snapMid" type="checkbox" checked> 中点</label>
          <label><input id="snapPoint" type="checkbox" checked> 点</label>
          <label><input id="snapIntersect" type="checkbox" checked> 交点</label>
          <label><input id="snapCircle" type="checkbox" checked> 中心</label>
          <label><input id="snapPerp" type="checkbox"> 垂線</label>
          <label><input id="snapTangent" type="checkbox"> 接線</label>
          <label><input id="snapNear" type="checkbox"> 近接点</label>
          <label><input id="snapText" type="checkbox" checked> 文字基点</label>
        </div>
      </details>

      <details class="floatingPanel dropdownPanel layerPanel" aria-label="layer settings">
        <summary>LAYER <span id="layerCount">0</span></summary>
        <div id="layers" class="dropdownBody layerBody"></div>
          <div class="layerAddRow"><input id="newLayerName" type="text" placeholder="新規レイヤ名"><button id="addLayerBtn" type="button">追加</button></div>
      </details>

      <details class="floatingPanel dropdownPanel propPanel" aria-label="object properties">
        <summary>PROPERTIES</summary>
        <div id="props" class="dropdownBody propBody">未選択</div>
      </details>



      <div id="snapDock" class="snapDock" aria-label="SNAP toggle dock">
        <button type="button" class="snapToggle" data-snap="snapEnd" title="端点"><span class="snapIcon snapEndIcon" aria-hidden="true"></span></button>
        <button type="button" class="snapToggle" data-snap="snapMid" title="中点"><span class="snapIcon snapMidIcon" aria-hidden="true"></span></button>
        <button type="button" class="snapToggle" data-snap="snapPoint" title="点"><span class="snapIcon snapPointIcon" aria-hidden="true"></span></button>
        <button type="button" class="snapToggle" data-snap="snapIntersect" title="交点"><span class="snapIcon snapIntersectIcon" aria-hidden="true"></span></button>
        <button type="button" class="snapToggle" data-snap="snapCircle" title="中心"><span class="snapIcon snapCircleIcon" aria-hidden="true"></span></button>
        <button type="button" class="snapToggle" data-snap="snapPerp" title="垂線"><span class="snapIcon snapPerpIcon" aria-hidden="true"></span></button>
        <button type="button" class="snapToggle" data-snap="snapTangent" title="接線"><span class="snapIcon snapTangentIcon" aria-hidden="true"></span></button>
        <button type="button" class="snapToggle" data-snap="snapNear" title="近接点"><span class="snapIcon snapNearIcon" aria-hidden="true"></span></button>
        <button type="button" class="snapToggle" data-snap="snapText" title="文字基点"><span class="snapIcon snapTextIcon" aria-hidden="true">A</span></button>
      </div>


      <section class="statusBar commandLine" aria-label="command line">
        <div class="cmdPrompt">コマンド</div>
        <pre id="info">「開く」を押してDXFを選択してください。座標表示は測量座標系：X=CAD-Y、Y=CAD-X。</pre>
      </section>
    </div>

    <aside id="panel" aria-hidden="true">
      <button id="openFileBtn2" type="button">DXFを選択</button>
    </aside>
  </main>
  <script src="app.js"></script>
<div id="objectMenu" style="display:none;position:fixed;z-index:9999;background:#222;border:1px solid #555;border-radius:6px">
<button id="objCopyBtn" type="button">コピー</button><button id="objDeleteBtn" type="button">削除</button></div><script>console.log("v47 finger pen cursor mode");</script></body>
</html>
